<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>EEDI Misconception DB</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        .card { border: 2px solid #333; padding: 25px; margin: 20px auto; width: 80%; max-width: 700px; border-radius: 8px; background-color: #f9f9f9; text-align: left; }
        .controls { margin-top: 20px; }
        button { padding: 10px 20px; cursor: pointer; margin: 5px; }
        #jumpId { padding: 8px; width: 100px; }
        #misconceptionField, #translatedField { font-family: 'Courier New', Courier, monospace; background: #eee; padding: 10px; border-radius: 4px; white-space: pre-wrap; word-break: break-all; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>EEDI Misconception DB</h1>
    <p id="status">데이터를 불러오는 중...</p>

    <div class="card">
        <h3 id="idField">ID: -</h3>
        <p><strong>Original:</strong></p>
        <div id="misconceptionField">-</div>
        <p><strong>한국어 번역:</strong></p>
        <div id="translatedField">-</div>
    </div>

    <div class="controls">
        <button onclick="prev()">◀ 이전</button>
        <input type="number" id="jumpId" placeholder="ID 입력">
        <button onclick="jump()">이동</button>
        <button onclick="next()">다음 ▶</button>
    </div>

    <script>
        // [수정 필요] 여기에 GitHub의 'Raw' CSV 주소를 넣으세요
        const CSV_URL = 'https://raw.githubusercontent.com/아이디/저장소/main/misconception_mapping.csv';
        
        let data = [];
        let currentIndex = 0;

        // 페이지가 열리면 자동으로 CSV 로드
        window.onload = async function() {
            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                const rows = text.split(/\r?\n/).slice(1);
                
                data = rows.filter(r => r.trim()).map(row => {
                    const cols = row.match(/(".*?"|[^,]+)/g);
                    return { 
                        id: cols[0].replace(/"/g, '').trim(), 
                        text: cols[1].replace(/"/g, '').trim() 
                    };
                });
                
                document.getElementById('status').innerText = `데이터 ${data.length}개 로드 완료`;
                checkUrlHash();
            } catch (e) {
                document.getElementById('status').innerText = "데이터 불러오기 실패!";
            }
        };

        function checkUrlHash() {
            const hashId = window.location.hash.substring(1);
            if (hashId) {
                const index = data.findIndex(i => i.id == hashId);
                if (index !== -1) currentIndex = index;
            }
            render();
        }

        async function render() {
            if (data[currentIndex]) {
                const item = data[currentIndex];
                document.getElementById('idField').innerText = 'ID: ' + item.id;
                document.getElementById('misconceptionField').innerText = item.text;
                
                // 주소창 업데이트 (워드 링크용)
                window.location.hash = item.id;
                
                document.getElementById('translatedField').innerText = "번역 중...";
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ko&dt=t&q=${encodeURIComponent(item.text)}`);
                const json = await res.json();
                document.getElementById('translatedField').innerText = json[0].map(i => i[0]).join("");
            }
        }

        function prev() { if (currentIndex > 0) { currentIndex--; render(); } }
        function next() { if (currentIndex < data.length - 1) { currentIndex++; render(); } }
        function jump() {
            const val = document.getElementById('jumpId').value;
            const index = data.findIndex(i => i.id == val);
            if (index !== -1) { currentIndex = index; render(); }
            else alert("ID를 찾을 수 없습니다.");
        }
    </script>
</body>
</html>
